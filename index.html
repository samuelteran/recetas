<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recetario de Laura</title>
    <style>
        :root { --color-principal: #e67e22; --color-fondo: #fff5e6; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: var(--color-fondo); color: #4e342e; margin: 0; padding: 20px; }
        
        /* Ruleta */
        #canvas-container { position: relative; margin: 20px auto; width: 300px; height: 300px; }
        #flecha { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                  border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 35px solid #c0392b; z-index: 10; }
        canvas { border-radius: 50%; border: 8px solid #d35400; box-shadow: 0 8px 20px rgba(0,0,0,0.2); width: 100%; height: 100%; }

        /* Botones */
        .btn-girar { padding: 15px 40px; font-size: 1.3rem; background: var(--color-principal); color: white; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #a04000; transition: 0.2s; }
        .btn-girar:active { transform: translateY(4px); box-shadow: none; }
        .btn-girar:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

        /* Panel de Receta */
        #receta-display { margin: 30px auto; max-width: 600px; background: white; padding: 25px; border-radius: 20px; display: none; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-left: 10px solid var(--color-principal); }
        h2 { color: var(--color-principal); text-transform: uppercase; margin-top: 0; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 1rem; line-height: 1.6; }
        .cerrar { background: #95a5a6; color: white; border: none; padding: 5px 15px; border-radius: 5px; float: right; cursor: pointer; }
    </style>
</head>
<body>

    <h1>La Cocina de Laura</h1>
    <p>Gira la ruleta para elegir tu próxima receta</p>
    
    <div id="canvas-container">
        <div id="flecha"></div>
        <canvas id="ruleta" width="500" height="500"></canvas>
    </div>

    <button id="btnMain" class="btn-girar" onclick="iniciarGiro()">¡GIRAR RULETA!</button>

    <div id="receta-display">
        <button class="cerrar" onclick="cerrarPanel()">Cerrar x</button>
        <h2 id="titulo-receta"></h2>
        <hr>
        <pre id="contenido-receta"></pre>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const MAX_POSIBLE = 300; // El número máximo de archivos que tienes
        // ---------------------

        const canvas = document.getElementById('ruleta');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btnMain');
        let anguloActual = 0;

        function dibujarRuleta() {
            const colores = ["#f1c40f", "#e67e22", "#e74c3c", "#3498db", "#2ecc71", "#9b59b6"];
            for (let i = 0; i < 12; i++) {
                ctx.beginPath();
                ctx.fillStyle = colores[i % colores.length];
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 250, i * Math.PI/6, (i+1) * Math.PI/6);
                ctx.fill();
                ctx.stroke();
            }
        }
        dibujarRuleta();

        function iniciarGiro() {
            btn.disabled = true;
            document.getElementById('receta-display').style.display = 'none';
            
            let vueltas = 8 + Math.random() * 5;
            let tiempo = 3500; 
            anguloActual += vueltas * 360;

            canvas.style.transition = `transform ${tiempo}ms cubic-bezier(0.15, 0, 0.15, 1)`;
            canvas.style.transform = `rotate(${anguloActual}deg)`;

            setTimeout(buscarRecetaValida, tiempo);
        }

        async function buscarRecetaValida() {
            // Intentamos encontrar una receta al azar que sí exista
            let encontrado = false;
            let intentos = 0;

            while (!encontrado && intentos < 20) {
                let num = Math.floor(Math.random() * MAX_POSIBLE) + 1;
                let nombreArchivo = num.toString().padStart(3, '0') + ".txt";
                
                try {
                    const res = await fetch(`recetas/${nombreArchivo}`);
                    if (res.ok) {
                        const texto = await res.text();
                        mostrarReceta(texto);
                        encontrado = true;
                    }
                } catch (e) { /* Sigue intentando */ }
                intentos++;
            }

            if (!encontrado) {
                alert("No se encontraron archivos en la carpeta /recetas/. Verifica que los nombres sean 001.txt, 002.txt, etc.");
            }
            btn.disabled = false;
        }

        function mostrarReceta(texto) {
            const lineas = texto.split('\n');
            document.getElementById('titulo-receta').innerText = lineas[0];
            document.getElementById('contenido-receta').innerText = texto;
            document.getElementById('receta-display').style.display = 'block';
            document.getElementById('receta-display').scrollIntoView({behavior: "smooth"});
        }

        function cerrarPanel() {
            document.getElementById('receta-display').style.display = 'none';
            window.scrollTo({top: 0, behavior: 'smooth'});
        }
    </script>
</body>
</html>
